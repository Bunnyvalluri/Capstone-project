services:
  - type: web
    name: noteland
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    disk:
      name: noteland-db
      mountPath: /opt/render/project/src/database
      sizeGB: 1
